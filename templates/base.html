<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Леший — Летопись чата</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-bar">
        {% if user %}
            <span class="auth-name">{{ user.first_name }}</span>
            <button class="auth-btn" onclick="handleLogout()">ВЫХОД</button>
        {% else %}
            <a href="/auth/login" class="auth-btn">ВХОД</a>
        {% endif %}
    </div>
    <header>
        <h1>Леший — Летопись чата</h1>
        <p class="subtitle">Ежедневные сводки из чата</p>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>TaigaBot Lite</footer>
    <script>
    function handleLogout() {
        fetch('/auth/logout', { method: 'POST' }).then(() => window.location.reload());
    }
    </script>
</body>
</html>
