<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Леший</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .login-box {
            text-align: center;
            padding: 2rem;
        }
        .login-box h2 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 1.4rem;
        }
        .login-box p {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .login-back {
            display: inline-block;
            margin-top: 2rem;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .login-back:hover {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Пульт Лешего</h2>
        <p>Авторизуйтесь через Telegram</p>
        <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="{{ bot_username }}"
                data-size="large"
                data-auth-url="{{ auth_callback_url }}"
                data-request-access="write"></script>
        <br>
        <a href="/" class="login-back">Вернуться к ленте</a>
    </div>
</body>
</html>
