<section class="dashboard">
    <h2 class="dashboard-title">Пульт Лешего</h2>
    <div class="dashboard-grid">

        <!-- Карточка 1: Чат с Лешим -->
        <div class="dashboard-card chat-card">
            <style>
            .chat-card { display:flex; flex-direction:column; }
            .chat-controls { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
            .chat-controls select { flex:1; background:#1a2a1a; color:#c0d8c0; border:1px solid #3a5a3a; border-radius:4px; padding:4px 8px; font-size:0.85rem; }
            .chat-messages { min-height:320px; max-height:400px; overflow-y:auto; background:#131f13; border:1px solid #2a3a2a; border-radius:4px; padding:10px; display:flex; flex-direction:column; gap:8px; }
            .chat-msg { max-width:82%; padding:8px 12px; border-radius:8px; font-size:0.9rem; line-height:1.5; word-break:break-word; }
            .chat-msg.user { align-self:flex-end; background:#1e3a1e; color:#d0ecd0; border:1px solid #2e5a2e; }
            .chat-msg.assistant { align-self:flex-start; background:#1a2820; color:#b8d0b8; border:1px solid #2a3828; }
            .chat-msg-meta { font-size:0.75rem; opacity:0.5; margin-top:4px; }
            .chat-input-row { display:flex; gap:8px; margin-top:8px; }
            .chat-input-row textarea { flex:1; background:#1a2a1a; color:#c0d8c0; border:1px solid #3a5a3a; border-radius:4px; padding:8px; font-size:0.9rem; resize:none; }
            </style>
            <h3>🌲 Чат с Лешим</h3>
            <div class="chat-controls">
                <select id="chat-dialog-select" onchange="chatSwitchDialog()"></select>
                <button id="chat-new-btn" onclick="chatNewDialog()">Новый диалог</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <p class="placeholder" style="margin:auto">Загрузка...</p>
            </div>
            <div class="chat-input-row">
                <textarea id="chat-input" rows="1" placeholder="Напиши Лешему..."></textarea>
                <button id="chat-send-btn" onclick="chatSend()">Отправить</button>
            </div>
        </div>

        <!-- Карточка 2: Статистика -->
        <div class="dashboard-card">
            <h3>Статистика</h3>
            <div id="stats-content"><p class="placeholder">Загрузка...</p></div>
        </div>

        <!-- Карточка 3: Редактор промпта (полная ширина) -->
        <div class="dashboard-card prompt-card">
            <h3>Редактор промпта</h3>
            <style>
            .prompt-tabs { display:flex; gap:4px; margin-bottom:10px; }
            .prompt-tab { background:#2a3a2a; color:#a0b8a0; border:1px solid #3a5a3a; border-radius:4px 4px 0 0; padding:6px 16px; cursor:pointer; font-size:0.9rem; transition:background .15s; }
            .prompt-tab.active { background:#3a5a3a; color:#e0f0e0; border-bottom-color:#3a5a3a; }
            .prompt-tab:hover:not(.active) { background:#2f4a2f; }
            </style>
            <div class="prompt-tabs">
                <button class="prompt-tab active" onclick="switchTab('system_prompt')">Промпт сводок</button>
                <button class="prompt-tab" onclick="switchTab('chat_system_prompt')">Промпт чата</button>
            </div>
            <textarea id="prompt-textarea" rows="15" spellcheck="false" placeholder="Загрузка промпта..."></textarea>
            <div class="prompt-actions">
                <button id="save-prompt-btn" onclick="savePrompt()">Сохранить</button>
                <button id="reset-prompt-btn" onclick="resetPrompt()">Сбросить к дефолту</button>
            </div>
            <div class="prompt-history">
                <button onclick="toggleHistory()" id="history-toggle">Показать историю (0)</button>
                <div id="history-list" style="display:none"></div>
            </div>
        </div>

    </div>
</section>

<script>
(function () {
    var historyData = [];
    var historyVisible = false;
    var currentPromptKey = 'system_prompt';

    function formatDate(ts) {
        return new Date(ts * 1000).toLocaleString('ru-RU', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }

    function formatDateShort(dateStr) {
        if (!dateStr) return '—';
        var parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr;
        var months = ['января','февраля','марта','апреля','мая','июня',
                      'июля','августа','сентября','октября','ноября','декабря'];
        return parseInt(parts[2]) + ' ' + months[parseInt(parts[1]) - 1] + ' ' + parts[0];
    }

    function loadStats() {
        fetch('/admin/stats')
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var el = document.getElementById('stats-content');
                el.innerHTML = '<div class="stats-grid">' +
                    '<div class="stat-item"><div class="stat-label">Сводок в архиве</div>' +
                    '<div class="stat-value">' + data.total_summaries + '</div></div>' +
                    '<div class="stat-item"><div class="stat-label">Последняя сводка</div>' +
                    '<div class="stat-value">' + formatDateShort(data.last_summary_date) + '</div></div>' +
                    '<div class="stat-item"><div class="stat-label">Наблюдение с</div>' +
                    '<div class="stat-value">' + formatDateShort(data.first_summary_date) + '</div></div>' +
                    '<div class="stat-item"><div class="stat-label">В буфере сейчас</div>' +
                    '<div class="stat-value">' + data.messages_in_buffer + '</div></div>' +
                    '</div>';
            })
            .catch(function () {
                document.getElementById('stats-content').innerHTML =
                    '<p class="placeholder">Не удалось загрузить</p>';
            });
    }

    function renderHistory() {
        var el = document.getElementById('history-list');
        var btn = document.getElementById('history-toggle');
        btn.textContent = (historyVisible ? 'Скрыть историю' : 'Показать историю') +
                          ' (' + historyData.length + ')';
        if (!historyData.length) {
            el.innerHTML = '<p class="placeholder" style="margin-top:0.5rem">История пуста</p>';
            return;
        }
        el.innerHTML = historyData.map(function (entry) {
            var meta = formatDate(entry.changed_at);
            if (entry.changed_by) meta += ' · ' + entry.changed_by;
            return '<div class="history-entry" onclick="applyHistory(' + entry.id + ')">' +
                '<div class="history-meta">' + meta + '</div>' +
                '<div class="history-preview">' + entry.preview.replace(/</g, '&lt;') + '…</div>' +
                '</div>';
        }).join('');
    }

    window.applyHistory = function (id) {
        var entry = historyData.find(function (e) { return e.id === id; });
        if (entry) {
            document.getElementById('prompt-textarea').value = entry.prompt_text;
        }
    };

    function loadPrompt(key) {
        fetch('/admin/prompt?prompt_key=' + key)
            .then(function (r) { return r.json(); })
            .then(function (data) {
                document.getElementById('prompt-textarea').value = data.current_prompt;
                historyData = data.history;
                renderHistory();
            })
            .catch(function () {
                document.getElementById('prompt-textarea').placeholder = 'Не удалось загрузить промпт';
            });
    }

    window.switchTab = function (key) {
        currentPromptKey = key;
        document.querySelectorAll('.prompt-tab').forEach(function (btn) {
            btn.classList.toggle('active', btn.getAttribute('onclick').indexOf("'" + key + "'") !== -1);
        });
        historyData = [];
        historyVisible = false;
        document.getElementById('history-list').style.display = 'none';
        loadPrompt(key);
    };

    window.savePrompt = function () {
        var text = document.getElementById('prompt-textarea').value.trim();
        if (!text) return;
        var btn = document.getElementById('save-prompt-btn');
        btn.disabled = true;
        fetch('/admin/prompt', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt_text: text, prompt_key: currentPromptKey})
        })
            .then(function (r) { return r.json(); })
            .then(function () {
                btn.textContent = 'Сохранено ✓';
                setTimeout(function () {
                    btn.textContent = 'Сохранить';
                    btn.disabled = false;
                }, 2000);
                loadPrompt(currentPromptKey);
            })
            .catch(function () {
                btn.textContent = 'Ошибка';
                setTimeout(function () {
                    btn.textContent = 'Сохранить';
                    btn.disabled = false;
                }, 2000);
            });
    };

    window.resetPrompt = function () {
        if (!confirm('Вернуть промпт по умолчанию?')) return;
        var btn = document.getElementById('reset-prompt-btn');
        btn.disabled = true;
        fetch('/admin/prompt/reset', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt_key: currentPromptKey})
        })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                document.getElementById('prompt-textarea').value = data.prompt;
                btn.disabled = false;
                loadPrompt(currentPromptKey);
            })
            .catch(function () {
                btn.disabled = false;
            });
    };

    window.toggleHistory = function () {
        historyVisible = !historyVisible;
        var el = document.getElementById('history-list');
        el.style.display = historyVisible ? 'block' : 'none';
        renderHistory();
    };

    loadStats();
    loadPrompt(currentPromptKey);
})();

(function () {
    var currentDialogId = null;

    function fmtDate(ts) {
        return new Date(ts * 1000).toLocaleString('ru-RU', {day: '2-digit', month: '2-digit', year: 'numeric'});
    }

    function fmtDateTime(ts) {
        return new Date(ts * 1000).toLocaleString('ru-RU', {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'});
    }

    function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function scrollMessages() {
        var el = document.getElementById('chat-messages');
        el.scrollTop = el.scrollHeight;
    }

    function renderMessages(msgs) {
        var el = document.getElementById('chat-messages');
        if (!msgs.length) {
            el.innerHTML = '<p class="placeholder" style="margin:auto">Диалог пуст. Напиши что-нибудь.</p>';
            return;
        }
        el.innerHTML = msgs.map(function (m) {
            var cls = m.role === 'user' ? 'user' : 'assistant';
            var name = m.role === 'user' ? 'Ты' : 'Леший';
            var body = m.role === 'assistant' ? m.content : escapeHtml(m.content);
            return '<div class="chat-msg ' + cls + '">' + body +
                '<div class="chat-msg-meta">' + name + ' · ' + fmtDateTime(m.created_at) + '</div>' +
                '</div>';
        }).join('');
        scrollMessages();
    }

    function loadMessages(dialogId) {
        fetch('/admin/chat/dialogs/' + dialogId + '/messages')
            .then(function (r) { return r.json(); })
            .then(renderMessages)
            .catch(function () {
                document.getElementById('chat-messages').innerHTML =
                    '<p class="placeholder">Не удалось загрузить сообщения</p>';
            });
    }

    function populateSelect(dialogs) {
        var sel = document.getElementById('chat-dialog-select');
        sel.innerHTML = dialogs.map(function (d) {
            return '<option value="' + d.id + '">Диалог от ' + fmtDate(d.created_at) + '</option>';
        }).join('');
    }

    window.chatSwitchDialog = function () {
        var sel = document.getElementById('chat-dialog-select');
        currentDialogId = parseInt(sel.value);
        loadMessages(currentDialogId);
    };

    window.chatNewDialog = function () {
        var btn = document.getElementById('chat-new-btn');
        btn.disabled = true;
        fetch('/admin/chat/dialogs', {method: 'POST'})
            .then(function (r) { return r.json(); })
            .then(function (data) {
                currentDialogId = data.dialog_id;
                var now = Math.floor(Date.now() / 1000);
                var sel = document.getElementById('chat-dialog-select');
                var opt = document.createElement('option');
                opt.value = currentDialogId;
                opt.textContent = 'Диалог от ' + fmtDate(now);
                sel.insertBefore(opt, sel.firstChild);
                sel.value = currentDialogId;
                document.getElementById('chat-messages').innerHTML =
                    '<p class="placeholder" style="margin:auto">Диалог пуст. Напиши что-нибудь.</p>';
                btn.disabled = false;
            })
            .catch(function () { btn.disabled = false; });
    };

    window.chatSend = function () {
        var input = document.getElementById('chat-input');
        var text = input.value.trim();
        if (!text || !currentDialogId) return;
        var sendBtn = document.getElementById('chat-send-btn');
        input.disabled = true;
        sendBtn.disabled = true;

        var msgsEl = document.getElementById('chat-messages');

        var userEl = document.createElement('div');
        userEl.className = 'chat-msg user';
        userEl.innerHTML = escapeHtml(text) + '<div class="chat-msg-meta">Ты</div>';
        msgsEl.appendChild(userEl);

        var thinkEl = document.createElement('div');
        thinkEl.className = 'chat-msg assistant';
        thinkEl.innerHTML = '<em>Леший думает…</em>';
        msgsEl.appendChild(thinkEl);
        scrollMessages();
        input.value = '';

        fetch('/admin/chat/dialogs/' + currentDialogId + '/messages', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                thinkEl.innerHTML = data.reply + '<div class="chat-msg-meta">Леший</div>';
                scrollMessages();
            })
            .catch(function () {
                thinkEl.innerHTML = '<em>Ошибка. Попробуй ещё раз.</em>';
            })
            .finally(function () {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            });
    };

    document.getElementById('chat-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); chatSend(); }
    });

    // Инициализация: загрузить диалоги или создать первый
    fetch('/admin/chat/dialogs')
        .then(function (r) { return r.json(); })
        .then(function (dialogs) {
            if (!dialogs.length) {
                return fetch('/admin/chat/dialogs', {method: 'POST'})
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        currentDialogId = data.dialog_id;
                        var now = Math.floor(Date.now() / 1000);
                        var sel = document.getElementById('chat-dialog-select');
                        var opt = document.createElement('option');
                        opt.value = currentDialogId;
                        opt.textContent = 'Диалог от ' + fmtDate(now);
                        sel.appendChild(opt);
                        document.getElementById('chat-messages').innerHTML =
                            '<p class="placeholder" style="margin:auto">Диалог пуст.</p>';
                    });
            }
            populateSelect(dialogs);
            currentDialogId = dialogs[0].id;
            document.getElementById('chat-dialog-select').value = currentDialogId;
            loadMessages(currentDialogId);
        })
        .catch(function () {
            document.getElementById('chat-messages').innerHTML =
                '<p class="placeholder">Не удалось загрузить диалоги</p>';
        });
})();
</script>
