<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Леший</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #1a1f2e);
      --text: var(--tg-theme-text-color, #e8dcc8);
      --hint: var(--tg-theme-hint-color, #8a9bb0);
      --button-bg: var(--tg-theme-button-color, #4a7c59);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #252b3d);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--hint);
      font-size: 1rem;
    }

    #content {
      padding-bottom: 60px;
    }

    /* Нижняя навигация */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: var(--secondary-bg);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      color: var(--hint);
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .nav-btn.active {
      color: var(--button-bg);
      font-weight: 600;
    }

    /* Вкладки */
    .tab-content {
      padding: 12px 16px;
    }

    /* Карточки сводок */
    .summary-card {
      background: var(--secondary-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .summary-date {
      font-size: 0.8rem;
      color: var(--hint);
      margin-bottom: 8px;
    }

    .summary-img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
      display: block;
    }

    .summary-text {
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    /* Ошибка */
    #error-msg {
      display: none;
      text-align: center;
      padding: 2rem;
      color: var(--hint);
    }

    /* Чат */
    .chat-tab {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px);
      padding: 8px 12px;
      gap: 8px;
    }
    .chat-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .chat-controls select {
      flex: 1;
      background: var(--secondary-bg);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.85rem;
    }
    .chat-controls button {
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 1rem;
      cursor: pointer;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(0,0,0,0.15);
      border-radius: 8px;
      padding: 10px;
    }
    .chat-placeholder {
      margin: auto;
      color: var(--hint);
      text-align: center;
    }
    .chat-msg {
      max-width: 82%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: var(--button-bg);
      color: var(--button-text);
    }
    .chat-msg.assistant {
      align-self: flex-start;
      background: var(--secondary-bg);
      color: var(--text);
    }
    .chat-msg-meta {
      font-size: 0.72rem;
      opacity: 0.5;
      margin-top: 4px;
    }
    .chat-input-area {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input-area textarea {
      flex: 1;
      background: var(--secondary-bg);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.9rem;
      resize: none;
      font-family: inherit;
    }
    .chat-input-area button {
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 1.1rem;
      cursor: pointer;
      align-self: flex-end;
    }

    /* Пульт */
    .admin-card {
      background: var(--secondary-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .admin-card h3 {
      margin: 0 0 12px;
      font-size: 1rem;
    }
    .prompt-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .prompt-tab-btn {
      padding: 6px 14px;
      background: var(--bg);
      color: var(--hint);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .prompt-tab-btn.active {
      background: var(--button-bg);
      color: var(--button-text);
      border-color: var(--button-bg);
    }
    #prompt-editor {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
    }
    .prompt-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .prompt-actions button {
      padding: 7px 16px;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #tab-admin details summary {
      cursor: pointer;
      color: var(--hint);
      font-size: 0.85rem;
      padding: 8px 0 4px;
    }
    .history-entry {
      padding: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.82rem;
      cursor: pointer;
    }
    .history-meta {
      color: var(--hint);
      margin-bottom: 2px;
    }
    .history-preview {
      color: var(--text);
      opacity: 0.8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #stats-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-item {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--hint);
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="loading">Леший выходит из чащи…</div>
  <div id="error-msg"></div>

  <div id="content" style="display:none">

    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="feed">Лента</button>
      <button class="nav-btn" data-tab="chat" id="nav-chat" style="display:none">Чат</button>
      <button class="nav-btn" data-tab="admin" id="nav-admin" style="display:none">Пульт</button>
    </nav>

    <div id="tab-feed" class="tab-content">
      <div id="feed-list"></div>
    </div>

    <div id="tab-chat" class="tab-content chat-tab" style="display:none">
      <div class="chat-controls">
        <select id="chat-dialog-select"></select>
        <button id="chat-new-btn">＋</button>
      </div>
      <div id="chat-messages" class="chat-messages">
        <p class="chat-placeholder">Загрузка…</p>
      </div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="Напиши Лешему…" rows="2"></textarea>
        <button id="chat-send-btn">→</button>
      </div>
    </div>

    <div id="tab-admin" class="tab-content" style="display:none">
      <div class="admin-card">
        <h3>Статистика</h3>
        <div id="stats-content">Загрузка…</div>
      </div>
      <div class="admin-card">
        <h3>Промпт</h3>
        <div class="prompt-tabs">
          <button class="prompt-tab-btn active" data-key="system_prompt">Сводки</button>
          <button class="prompt-tab-btn" data-key="chat_system_prompt">Чат</button>
        </div>
        <textarea id="prompt-editor" rows="10"></textarea>
        <div class="prompt-actions">
          <button id="prompt-save-btn">Сохранить</button>
          <button id="prompt-reset-btn">Сбросить</button>
        </div>
        <details>
          <summary>История версий</summary>
          <div id="prompt-history"></div>
        </details>
      </div>
    </div>

  </div>
</div>

<script>
  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function loadFeed() {
    const res = await fetch('/miniapp/feed');
    if (!res.ok) {
      showError('Не удалось загрузить ленту');
      return;
    }
    const data = await res.json();
    const list = document.getElementById('feed-list');
    if (!data.summaries || data.summaries.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:var(--hint);padding:2rem">Сводок пока нет. Леший ещё спит.</p>';
      return;
    }
    list.innerHTML = data.summaries.map(s => {
      const imgHtml = s.image_url
        ? `<img class="summary-img" src="${s.image_url}" onerror="this.style.display='none'" loading="lazy">`
        : '';
      const text = s.summary_text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return `<div class="summary-card">
        <div class="summary-date">${s.date}</div>
        ${imgHtml}
        <div class="summary-text">${text}</div>
      </div>`;
    }).join('');
  }

  function initTabs() {
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = '';
        btn.classList.add('active');
        if (tab === 'chat') { window._chatTabActivate && window._chatTabActivate(); }
        if (tab === 'admin') { window._adminTabActivate && window._adminTabActivate(); }
      });
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const initData = tg?.initData || '';
    try {
      const res = await fetch('/miniapp/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({initData}),
      });
      if (!res.ok) {
        showError('Ошибка авторизации');
        return;
      }
      const data = await res.json();

      if (data.user.is_dialog_allowed) {
        document.getElementById('nav-chat').style.display = '';
      }
      if (data.user.is_admin) {
        document.getElementById('nav-admin').style.display = '';
      }

      await loadFeed();

      initTabs();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = '';

    } catch (e) {
      showError('Нет связи с сервером');
    }
  });

  (function() {
    var currentDialogId = null;
    var chatInitialized = false;

    function fmtDate(ts) {
      return new Date(ts * 1000).toLocaleString('ru-RU', {
        day: '2-digit', month: '2-digit', year: 'numeric'
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function scrollChat() {
      var el = document.getElementById('chat-messages');
      el.scrollTop = el.scrollHeight;
    }

    function renderMessages(msgs) {
      var el = document.getElementById('chat-messages');
      if (!msgs.length) {
        el.innerHTML = '<p class="chat-placeholder">Диалог пуст. Напиши что-нибудь.</p>';
        return;
      }
      el.innerHTML = msgs.map(function(m) {
        var cls = m.role === 'user' ? 'user' : 'assistant';
        var name = m.role === 'user' ? 'Ты' : 'Леший';
        var body = m.role === 'assistant' ? m.content : escapeHtml(m.content);
        return '<div class="chat-msg ' + cls + '">' + body +
          '<div class="chat-msg-meta">' + name + '</div></div>';
      }).join('');
      scrollChat();
    }

    function loadMessages(dialogId) {
      fetch('/miniapp/chat/dialogs/' + dialogId + '/messages')
        .then(function(r) { return r.json(); })
        .then(renderMessages)
        .catch(function() {
          document.getElementById('chat-messages').innerHTML =
            '<p class="chat-placeholder">Не удалось загрузить сообщения</p>';
        });
    }

    function loadDialogs() {
      fetch('/miniapp/chat/dialogs')
        .then(function(r) { return r.json(); })
        .then(function(dialogs) {
          if (!dialogs.length) {
            return fetch('/miniapp/chat/dialogs', {method: 'POST'})
              .then(function(r) { return r.json(); })
              .then(function(data) {
                currentDialogId = data.dialog_id;
                var now = Math.floor(Date.now() / 1000);
                var sel = document.getElementById('chat-dialog-select');
                var opt = document.createElement('option');
                opt.value = currentDialogId;
                opt.textContent = 'Диалог от ' + fmtDate(now);
                sel.appendChild(opt);
                document.getElementById('chat-messages').innerHTML =
                  '<p class="chat-placeholder">Диалог пуст. Напиши что-нибудь.</p>';
              });
          }
          var sel = document.getElementById('chat-dialog-select');
          sel.innerHTML = dialogs.map(function(d) {
            return '<option value="' + d.id + '">Диалог от ' + fmtDate(d.created_at) + '</option>';
          }).join('');
          currentDialogId = dialogs[0].id;
          sel.value = currentDialogId;
          loadMessages(currentDialogId);
        })
        .catch(function() {
          document.getElementById('chat-messages').innerHTML =
            '<p class="chat-placeholder">Не удалось загрузить диалоги</p>';
        });
    }

    window._chatTabActivate = function() {
      if (!chatInitialized) {
        chatInitialized = true;
        loadDialogs();
      }
    };

    document.getElementById('chat-dialog-select').addEventListener('change', function() {
      currentDialogId = parseInt(this.value);
      loadMessages(currentDialogId);
    });

    document.getElementById('chat-new-btn').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      fetch('/miniapp/chat/dialogs', {method: 'POST'})
        .then(function(r) { return r.json(); })
        .then(function(data) {
          currentDialogId = data.dialog_id;
          var now = Math.floor(Date.now() / 1000);
          var sel = document.getElementById('chat-dialog-select');
          var opt = document.createElement('option');
          opt.value = currentDialogId;
          opt.textContent = 'Диалог от ' + fmtDate(now);
          sel.insertBefore(opt, sel.firstChild);
          sel.value = currentDialogId;
          document.getElementById('chat-messages').innerHTML =
            '<p class="chat-placeholder">Диалог пуст. Напиши что-нибудь.</p>';
          btn.disabled = false;
        })
        .catch(function() { btn.disabled = false; });
    });

    function sendMessage() {
      var input = document.getElementById('chat-input');
      var text = input.value.trim();
      if (!text || !currentDialogId) return;

      window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('light');

      var sendBtn = document.getElementById('chat-send-btn');
      input.disabled = true;
      sendBtn.disabled = true;

      var msgsEl = document.getElementById('chat-messages');
      var userEl = document.createElement('div');
      userEl.className = 'chat-msg user';
      userEl.innerHTML = escapeHtml(text) + '<div class="chat-msg-meta">Ты</div>';
      msgsEl.appendChild(userEl);

      var thinkEl = document.createElement('div');
      thinkEl.className = 'chat-msg assistant';
      thinkEl.innerHTML = '<em>Леший думает…</em>';
      msgsEl.appendChild(thinkEl);
      scrollChat();
      input.value = '';

      fetch('/miniapp/chat/dialogs/' + currentDialogId + '/messages', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text})
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          thinkEl.innerHTML = data.reply + '<div class="chat-msg-meta">Леший</div>';
          scrollChat();
        })
        .catch(function() {
          thinkEl.innerHTML = '<em>Ошибка. Попробуй ещё раз.</em>';
        })
        .finally(function() {
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
        });
    }

    document.getElementById('chat-send-btn').addEventListener('click', sendMessage);
    document.getElementById('chat-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  })();

  (function() {
    var adminInitialized = false;
    var currentPromptKey = 'system_prompt';
    var promptsCache = null;

    function fmtDateTime(ts) {
      return new Date(ts * 1000).toLocaleString('ru-RU', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function fmtDate(d) {
      if (!d) return '—';
      var months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
      var p = d.split('-');
      return parseInt(p[2]) + ' ' + months[parseInt(p[1]) - 1] + ' ' + p[0];
    }

    function loadStats() {
      fetch('/miniapp/admin/stats')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var el = document.getElementById('stats-content');
          el.innerHTML =
            '<div class="stat-item"><div class="stat-label">Сводок</div>' +
            '<div class="stat-value">' + data.total_summaries + '</div></div>' +
            '<div class="stat-item"><div class="stat-label">Последняя</div>' +
            '<div class="stat-value">' + fmtDate(data.last_summary_date) + '</div></div>' +
            '<div class="stat-item"><div class="stat-label">С начала</div>' +
            '<div class="stat-value">' + fmtDate(data.first_summary_date) + '</div></div>' +
            '<div class="stat-item"><div class="stat-label">В буфере</div>' +
            '<div class="stat-value">' + data.messages_in_buffer + '</div></div>';
        })
        .catch(function() {
          document.getElementById('stats-content').textContent = 'Не удалось загрузить';
        });
    }

    function applyPromptCache() {
      if (!promptsCache) return;
      var text = currentPromptKey === 'system_prompt'
        ? promptsCache.summary_prompt
        : promptsCache.chat_prompt;
      document.getElementById('prompt-editor').value = text;
      loadHistory(currentPromptKey);
    }

    function loadPrompts() {
      fetch('/miniapp/admin/prompt')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          promptsCache = data;
          applyPromptCache();
        })
        .catch(function() {
          document.getElementById('prompt-editor').placeholder = 'Не удалось загрузить промпт';
        });
    }

    function loadHistory(key) {
      fetch('/miniapp/admin/prompt/history?key=' + key)
        .then(function(r) { return r.json(); })
        .then(function(rows) {
          var el = document.getElementById('prompt-history');
          if (!rows.length) {
            el.innerHTML = '<p style="color:var(--hint);font-size:0.82rem;padding:4px 0">История пуста</p>';
            return;
          }
          el.innerHTML = rows.map(function(r, idx) {
            var meta = fmtDateTime(r.changed_at) + (r.changed_by ? ' · ' + r.changed_by : '');
            var preview = String(r.preview).replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return '<div class="history-entry" data-idx="' + idx + '">' +
              '<div class="history-meta">' + meta + '</div>' +
              '<div class="history-preview">' + preview + '…</div></div>';
          }).join('');
          el.querySelectorAll('.history-entry').forEach(function(entry) {
            var idx = parseInt(entry.dataset.idx);
            entry.addEventListener('click', function() {
              document.getElementById('prompt-editor').value = rows[idx].prompt_text;
            });
          });
        })
        .catch(function() {});
    }

    document.querySelectorAll('.prompt-tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentPromptKey = this.dataset.key;
        document.querySelectorAll('.prompt-tab-btn').forEach(function(b) {
          b.classList.toggle('active', b === btn);
        });
        applyPromptCache();
      });
    });

    document.getElementById('prompt-save-btn').addEventListener('click', function() {
      var btn = this;
      var text = document.getElementById('prompt-editor').value.trim();
      if (!text) return;
      btn.disabled = true;
      fetch('/miniapp/admin/prompt', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt_key: currentPromptKey, content: text})
      })
        .then(function(r) { return r.json(); })
        .then(function() {
          if (currentPromptKey === 'system_prompt') {
            promptsCache.summary_prompt = text;
          } else {
            promptsCache.chat_prompt = text;
          }
          btn.textContent = 'Сохранено ✓';
          setTimeout(function() { btn.textContent = 'Сохранить'; btn.disabled = false; }, 2000);
          loadHistory(currentPromptKey);
        })
        .catch(function() {
          btn.textContent = 'Ошибка';
          setTimeout(function() { btn.textContent = 'Сохранить'; btn.disabled = false; }, 2000);
        });
    });

    document.getElementById('prompt-reset-btn').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      fetch('/miniapp/admin/prompt/reset', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt_key: currentPromptKey})
      })
        .then(function(r) { return r.json(); })
        .then(function() {
          promptsCache = null;
          loadPrompts();
          btn.disabled = false;
        })
        .catch(function() { btn.disabled = false; });
    });

    window._adminTabActivate = function() {
      if (!adminInitialized) {
        adminInitialized = true;
        loadStats();
        loadPrompts();
      }
    };
