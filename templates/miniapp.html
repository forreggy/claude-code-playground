<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Леший</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #1a1f2e);
      --text: var(--tg-theme-text-color, #e8dcc8);
      --hint: var(--tg-theme-hint-color, #8a9bb0);
      --button-bg: var(--tg-theme-button-color, #4a7c59);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #252b3d);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--hint);
      font-size: 1rem;
    }

    #content {
      padding-bottom: 60px;
    }

    /* Нижняя навигация */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: var(--secondary-bg);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      color: var(--hint);
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .nav-btn.active {
      color: var(--button-bg);
      font-weight: 600;
    }

    /* Вкладки */
    .tab-content {
      padding: 12px 16px;
    }

    /* Карточки сводок */
    .summary-card {
      background: var(--secondary-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .summary-date {
      font-size: 0.8rem;
      color: var(--hint);
      margin-bottom: 8px;
    }

    .summary-img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
      display: block;
    }

    .summary-text {
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    /* Ошибка */
    #error-msg {
      display: none;
      text-align: center;
      padding: 2rem;
      color: var(--hint);
    }
  </style>
</head>
<body>

<div id="app">
  <div id="loading">Леший выходит из чащи…</div>
  <div id="error-msg"></div>

  <div id="content" style="display:none">

    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="feed">Лента</button>
      <button class="nav-btn" data-tab="chat" id="nav-chat" style="display:none">Чат</button>
      <button class="nav-btn" data-tab="admin" id="nav-admin" style="display:none">Пульт</button>
    </nav>

    <div id="tab-feed" class="tab-content">
      <div id="feed-list"></div>
    </div>

    <div id="tab-chat" class="tab-content" style="display:none">
      <p style="text-align:center;padding:2rem;color:var(--hint)">Чат — скоро</p>
    </div>

    <div id="tab-admin" class="tab-content" style="display:none">
      <p style="text-align:center;padding:2rem;color:var(--hint)">Пульт — скоро</p>
    </div>

  </div>
</div>

<script>
  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function loadFeed() {
    const res = await fetch('/miniapp/feed');
    if (!res.ok) {
      showError('Не удалось загрузить ленту');
      return;
    }
    const data = await res.json();
    const list = document.getElementById('feed-list');
    if (!data.summaries || data.summaries.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:var(--hint);padding:2rem">Сводок пока нет. Леший ещё спит.</p>';
      return;
    }
    list.innerHTML = data.summaries.map(s => {
      const imgHtml = s.image_url
        ? `<img class="summary-img" src="${s.image_url}" onerror="this.style.display='none'" loading="lazy">`
        : '';
      const text = s.summary_text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return `<div class="summary-card">
        <div class="summary-date">${s.date}</div>
        ${imgHtml}
        <div class="summary-text">${text}</div>
      </div>`;
    }).join('');
  }

  function initTabs() {
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = '';
        btn.classList.add('active');
      });
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const initData = tg?.initData || '';
    try {
      const res = await fetch('/miniapp/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({initData}),
      });
      if (!res.ok) {
        showError('Ошибка авторизации');
        return;
      }
      const data = await res.json();

      if (data.user.is_dialog_allowed) {
        document.getElementById('nav-chat').style.display = '';
      }
      if (data.user.is_admin) {
        document.getElementById('nav-admin').style.display = '';
      }

      await loadFeed();

      initTabs();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = '';

    } catch (e) {
      showError('Нет связи с сервером');
    }
  });
</script>

</body>
</html>
